version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "25:25"
    volumes:
      - ./data:/app/data
      # Mount source for live reload in development
      - ./src:/app/src
      - ./views:/app/views
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    depends_on:
      - mailhog
    command: npx nodemon src/app.js

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI - view captured emails at http://localhost:8025
    restart: unless-stopped
