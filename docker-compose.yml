version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "25:25"
    volumes:
      - ./data:/app/data
      # Mount source for live reload in development
      - ./src:/app/src
      - ./views:/app/views
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    command: npx nodemon src/app.js
